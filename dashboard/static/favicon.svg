<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="#1e1e2e" stroke="#89b4fa" stroke-width="3"/>
  <circle cx="50" cy="50" r="8" fill="#22c55e">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
</svg>
